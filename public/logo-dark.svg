<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 80" fill="none">

  <!-- ── Ícone (versão fundo escuro) ─────────────────── -->
  <rect width="80" height="80" rx="18" fill="#c86f4a"/>
  <!-- traço vertical do L -->
  <rect x="22" y="17" width="9" height="36" rx="2" fill="#fffaf0"/>
  <!-- traço horizontal do L — acento verde -->
  <rect x="22" y="47" width="32" height="9" rx="2" fill="#46624a"/>

  <!-- ── Wordmark (claro, para fundos escuros) ────────── -->
  <text
    x="100" y="52"
    font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
  >
    <tspan font-weight="700" fill="#fffaf0">lex</tspan><tspan font-weight="300" fill="rgba(255,250,240,0.6)">uri</tspan>
  </text>
  <!-- sublinhado clay sob "lex" -->
  <rect x="100" y="59" width="63" height="3.5" rx="1.75" fill="#c86f4a"/>

</svg>
