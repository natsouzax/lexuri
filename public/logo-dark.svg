<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">

  <!-- ── Ícone: quadrado paper com "L" ink (versão fundo escuro) ── -->
  <rect width="72" height="72" rx="16" fill="#fffaf0"/>
  <text
    x="36" y="53"
    text-anchor="middle"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="46"
    fill="#18211d"
  >L</text>

  <!-- ── Wordmark: "lex" pesado + "uri" fino, em paper ─────────── -->
  <text
    x="92" y="50"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-size="36"
  >
    <tspan font-weight="900" fill="#fffaf0">lex</tspan><tspan font-weight="200" fill="rgba(255,250,240,0.6)">uri</tspan>
  </text>

</svg>
