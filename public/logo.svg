<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" fill="none">

  <!-- ── Ícone: quadrado ink com "L" serif em paper ─── -->
  <rect width="72" height="72" rx="16" fill="#18211d"/>
  <text
    x="36" y="53"
    text-anchor="middle"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-weight="900"
    font-size="46"
    fill="#fffaf0"
  >L</text>

  <!-- ── Wordmark: "lex" pesado + "uri" fino ──────────── -->
  <text
    x="92" y="50"
    font-family="Fraunces, Georgia, 'Times New Roman', serif"
    font-size="36"
  >
    <tspan font-weight="900" fill="#18211d">lex</tspan><tspan font-weight="200" fill="#18211d">uri</tspan>
  </text>

</svg>
